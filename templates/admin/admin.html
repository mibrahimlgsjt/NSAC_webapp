{% extends 'base.html' %}

{% block content %}
<div class="flex flex-col items-center justify-center min-h-[70vh] py-10">
    <div class="form-card w-full max-w-md text-center stagger-card" style="animation-delay: 0.1s">
        <div class="h-24 w-24 bg-paw text-white rounded-md mx-auto flex items-center justify-center mb-8 shadow-paw transform -translate-y-16 border-4 border-paper">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
            </svg>
        </div>
        
        <div class="-mt-12 mb-8">
            <h2 class="text-3xl font-extrabold text-ink mb-2">Volunteer Portal</h2>
            <p class="text-muted font-bold text-xs uppercase tracking-widest">Authorized Access Only</p>
        </div>
        
        {% if error %}
        <div class="bg-rosewood-light text-rosewood px-4 py-3 rounded-md mb-6 font-bold text-xs border-2 border-rosewood/20 animate-pulse">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/admin" class="space-y-6">
            <div>
                <input type="password" name="pin" placeholder="ENTER PIN" 
                       class="form-input text-center text-2xl tracking-[0.5em] placeholder:tracking-normal placeholder:text-sm"
                       required autofocus>
            </div>
            <button type="submit" class="w-full btn-primary bg-paw">
                Unlock Panel 🔓
            </button>
        </form>

        <div class="mt-8 pt-6 border-t-2 border-ink/5">
            <a href="/" class="text-sm font-bold text-muted hover:text-paw transition">← Back to Campus Dashboard</a>
        </div>
    </div>
</div>

<style>
    .form-card {
        @apply bg-paper rounded-lg p-10 shadow-card border-2 border-ink/5;
        background-image: repeating-linear-gradient(
            transparent,
            transparent 31px,
            rgba(45,32,19,0.03) 32px
        );
    }

    .form-input {
        @apply w-full bg-cream border-2 border-ink/10 rounded-md px-4 py-4 font-display font-extrabold text-ink outline-none transition-all focus:border-paw focus:shadow-[0_0_0_4px_var(--color-paw-light)];
    }
</style>
{% endblock %}
